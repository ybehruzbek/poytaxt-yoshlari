# @yoshlaruchuntanlov_bot — polling rejimidagi Telegram bot.
# Bitta servis yetadi: entrypoint sxema yaratadi, migratsiya qiladi, botni yuritadi.
# DB — saytning PostgreSQL'i (alohida DB_SCHEMA bilan), .env orqali sozlanadi.
services:
  bot:
    build: .
    container_name: yoshlar-tanlov-bot
    env_file:
      - .env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
