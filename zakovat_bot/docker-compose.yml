version: "3.9"

services:
  django:
    build: .
    container_name: zakovat_django
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - .env
    expose:
      - "8000"
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"

  bot:
    build: .
    container_name: zakovat_bot
    command: python manage.py bot
    env_file:
      - .env
    restart: always
    depends_on:
      - django
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:latest
    container_name: zakovat_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
    ports:
      - "80:80"
    depends_on:
      - django
    restart: always

volumes:
  static_volume:
